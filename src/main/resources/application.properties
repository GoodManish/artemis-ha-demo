# ActiveMQ Artemis HA Spring Boot client
# Connects to the external live/backup brokers you started manually.

# failover:// tries live (61616) first; on disconnect switches to backup (61617)
# ha=true                prefer the active node in an HA pair
# reconnectAttempts=-1   retry forever (never give up)
# retryInterval=500      500ms between reconnect attempts
spring.artemis.broker-url=tcp://localhost:61616
#spring.artemis.broker-url=failover:(tcp://localhost:61616,tcp://localhost:61617)?ha=true&reconnectAttempts=-1&retryInterval=500&retryIntervalMultiplier=1.0
spring.artemis.user=admin
spring.artemis.password=admin

# native = connect to external broker; do NOT start an embedded broker
spring.artemis.mode=native

app.queue.name=demo.queue

# Producer fires every 3 seconds change to see failover faster/slower
app.producer.interval-ms=3000
