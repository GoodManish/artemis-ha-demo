##############################################################################
# Artemis HA ? broker connection
#
# NOTE: Artemis does NOT support the failover:// URL scheme (that is ActiveMQ
# Classic only). HA is configured programmatically in JmsConfig.java using
# TransportConfiguration + ServerLocator with ha=true.
##############################################################################

# Live broker (primary)
artemis.live.host=localhost
artemis.live.port=61616

# Backup broker (replica)
artemis.backup.host=localhost
artemis.backup.port=61617

# Credentials (same for both brokers)
spring.artemis.user=admin
spring.artemis.password=admin

# Tell Spring Boot not to spin up an embedded broker
spring.artemis.mode=native

##############################################################################
# App settings
##############################################################################
app.queue.name=demo.queue

# Producer fires every 3 seconds
app.producer.interval-ms=8000
